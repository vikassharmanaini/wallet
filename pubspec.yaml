name: superweb3wallet
description: SuperWeb3Wallet — non-custodial crypto wallet (iOS + Android).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Web3 / Crypto
  web3dart: ^2.7.3
  bip39: ^1.0.6
  bip32: ^2.0.0
  ed25519_hd_key: ^2.3.0
  convert: ^3.1.1
  pointycastle: ^3.7.4
  hex: ^0.2.0
  encrypt: ^5.0.3

  # Networking
  dio: ^5.4.0
  web_socket_channel: ^2.4.0

  # State
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5

  # Storage
  flutter_secure_storage: ^9.2.2
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Navigation
  go_router: ^14.6.2

  # Codegen models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  lottie: ^3.1.3
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.69.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2

  # Biometrics
  local_auth: ^2.3.0

  share_plus: ^10.1.4

  # WalletConnect added in Phase 13 when dependency graph is aligned.
  app_links: ^6.3.3

  flutter_local_notifications: ^18.0.1

  url_launcher: ^6.3.1
  package_info_plus: ^8.1.2
  device_info_plus: ^11.2.0
  webview_flutter: ^4.10.0
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  mocktail: ^1.0.4
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/animations/
    - assets/networks.json
